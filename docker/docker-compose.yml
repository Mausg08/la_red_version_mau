x-php-service: &php_service
  build:
    context: ..
    dockerfile: docker/php/Dockerfile
  volumes:
    - ..:/var/www/html
    - ../storage:/var/www/html/storage
  networks:
    - unilink_net
  restart: unless-stopped

x-service-env: &service_env
  APP_ENV: production
  BASE_PATH: /RedSocial_BUAP
  STORAGE_PATH: /var/www/html/storage
  JWT_SECRET: ${JWT_SECRET:-CHANGE_THIS_TO_A_SECURE_32_CHAR_KEY}
  DB_USER: unilink
  DB_PASS: ${DB_PASSWORD:-securepassword}
  DB_NAME: red_social

x-mysql-db: &mysql_db
  image: mysql:8.0
  environment:
    MYSQL_DATABASE: red_social
    MYSQL_USER: unilink
    MYSQL_PASSWORD: ${DB_PASSWORD:-securepassword}
    MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
  networks:
    - unilink_net
  restart: unless-stopped

services:
  web:
    <<: *php_service
    container_name: unilink_web
    ports:
      - "80:80"
      - "443:443"
    environment:
      <<: *service_env
      DB_HOST: db_users
      FEED_SERVICE_URL: http://feed-service/backend/microservices
      GROUPS_SERVICE_URL: http://groups-service/backend/microservices
      CALENDAR_SERVICE_URL: http://calendar-service/backend/microservices
      MARKETPLACE_SERVICE_URL: http://marketplace-service/backend/microservices
      LOST_FOUND_SERVICE_URL: http://lost-found-service/backend/microservices
      DIRECTORY_SERVICE_URL: http://directory-service/backend/microservices
      POLLS_SERVICE_URL: http://polls-service/backend/microservices
    depends_on:
      - db_users
      - feed-service
      - groups-service
      - calendar-service
      - marketplace-service
      - lost-found-service
      - directory-service
      - polls-service
      - redis

  feed-service:
    <<: *php_service
    container_name: unilink_feed
    environment:
      <<: *service_env
      SERVICE_NAME: feed
      DB_HOST: db_feed
    depends_on:
      - db_feed

  groups-service:
    <<: *php_service
    container_name: unilink_groups
    environment:
      <<: *service_env
      SERVICE_NAME: groups
      DB_HOST: db_groups
    depends_on:
      - db_groups

  calendar-service:
    <<: *php_service
    container_name: unilink_calendar
    environment:
      <<: *service_env
      SERVICE_NAME: calendar
      DB_HOST: db_calendar
    depends_on:
      - db_calendar

  marketplace-service:
    <<: *php_service
    container_name: unilink_marketplace
    environment:
      <<: *service_env
      SERVICE_NAME: marketplace
      DB_HOST: db_marketplace
    depends_on:
      - db_marketplace

  lost-found-service:
    <<: *php_service
    container_name: unilink_lost_found
    environment:
      <<: *service_env
      SERVICE_NAME: lost-found
      DB_HOST: db_lost_found
    depends_on:
      - db_lost_found

  directory-service:
    <<: *php_service
    container_name: unilink_directory
    environment:
      <<: *service_env
      SERVICE_NAME: directory
      DB_HOST: db_directory
    depends_on:
      - db_directory

  polls-service:
    <<: *php_service
    container_name: unilink_polls
    environment:
      <<: *service_env
      SERVICE_NAME: polls
      DB_HOST: db_polls
    depends_on:
      - db_polls

  websocket:
    build:
      context: ../websocket-server
      dockerfile: Dockerfile
    container_name: unilink_ws
    ports:
      - "3001:3001"
    environment:
      JWT_SECRET: ${JWT_SECRET:-CHANGE_THIS_TO_A_SECURE_32_CHAR_KEY}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redissecret}@redis:6379
      PORT: 3001
    depends_on:
      - redis
    networks:
      - unilink_net
    restart: unless-stopped

  db_users:
    <<: *mysql_db
    container_name: red_social_users
    volumes:
      - db_users_data:/var/lib/mysql
      - ../red_social.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro

  db_feed:
    <<: *mysql_db
    container_name: red_social_feed
    volumes:
      - db_feed_data:/var/lib/mysql
      - ../red_social.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro

  db_groups:
    <<: *mysql_db
    container_name: red_social_groups
    volumes:
      - db_groups_data:/var/lib/mysql
      - ../red_social.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro

  db_calendar:
    <<: *mysql_db
    container_name: red_social_calendar
    volumes:
      - db_calendar_data:/var/lib/mysql
      - ../red_social.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro

  db_marketplace:
    <<: *mysql_db
    container_name: red_social_marketplace
    volumes:
      - db_marketplace_data:/var/lib/mysql
      - ../red_social.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro

  db_lost_found:
    <<: *mysql_db
    container_name: red_social_lost_found
    volumes:
      - db_lost_found_data:/var/lib/mysql
      - ../red_social.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro

  db_directory:
    <<: *mysql_db
    container_name: red_social_directory
    volumes:
      - db_directory_data:/var/lib/mysql
      - ../red_social.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro

  db_polls:
    <<: *mysql_db
    container_name: red_social_polls
    volumes:
      - db_polls_data:/var/lib/mysql
      - ../red_social.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro

  db_moderation:
    image: mongo:7
    container_name: red_social_mod
    environment:
      MONGO_INITDB_ROOT_USERNAME: unilink
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD:-securepassword}
      MONGO_INITDB_DATABASE: red_social
    volumes:
      - db_mod_data:/data/db
    networks:
      - unilink_net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: unilink_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redissecret} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - unilink_net
    restart: unless-stopped

  queue_worker:
    build:
      context: ..
      dockerfile: docker/php/Dockerfile
    container_name: unilink_queue
    command: php /var/www/html/backend/queue/worker.php
    volumes:
      - ..:/var/www/html
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-redissecret}@redis:6379
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    depends_on:
      - redis
    networks:
      - unilink_net
    restart: unless-stopped

  storage:
    image: minio/minio
    container_name: unilink_storage
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-unilink}
      MINIO_ROOT_PASSWORD: ${MINIO_PASS:-minioadmin123}
    volumes:
      - minio_data:/data
    networks:
      - unilink_net
    restart: unless-stopped

volumes:
  db_users_data:
  db_feed_data:
  db_groups_data:
  db_calendar_data:
  db_marketplace_data:
  db_lost_found_data:
  db_directory_data:
  db_polls_data:
  db_mod_data:
  redis_data:
  minio_data:

networks:
  unilink_net:
    driver: bridge
