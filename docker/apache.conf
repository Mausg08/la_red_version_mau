<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        AllowOverride All
        Require all granted
        Options -Indexes +FollowSymLinks
    </Directory>

    # Proxy WebSocket to Node.js
    ProxyPass /socket.io/ ws://websocket:3001/socket.io/
    ProxyPassReverse /socket.io/ ws://websocket:3001/socket.io/

    # API Gateway clean URLs
    RewriteEngine On
    RewriteRule ^/api/(.*)$ /backend/api-gateway/index.php?service=$1 [QSA,L]

    ErrorLog ${APACHE_LOG_DIR}/unilink_error.log
    CustomLog ${APACHE_LOG_DIR}/unilink_access.log combined
</VirtualHost>
